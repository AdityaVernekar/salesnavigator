name: SalesNavy - Build, Push to ECR, Deploy to Lightsail

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SALESNAVY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SALESNAVY_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --build-arg SUPABASE_DB_POOLER_URL="${{ secrets.SUPABASE_DB_POOLER_URL }}" \
            --build-arg UPSTASH_REDIS_REST_URL="${{ secrets.UPSTASH_REDIS_REST_URL }}" \
            --build-arg UPSTASH_REDIS_REST_TOKEN="${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" \
            --build-arg OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --build-arg ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --build-arg EXA_API_KEY="${{ secrets.EXA_API_KEY }}" \
            --build-arg CLADO_API_KEY="${{ secrets.CLADO_API_KEY }}" \
            --build-arg COMPOSIO_API_KEY="${{ secrets.COMPOSIO_API_KEY }}" \
            --build-arg ENCRYPTION_MASTER_KEY="${{ secrets.ENCRYPTION_MASTER_KEY }}" \
            --build-arg CRON_SECRET="${{ secrets.CRON_SECRET }}" \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            cd /opt/salesnavy && ./deploy.sh