services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        SUPABASE_DB_POOLER_URL: ${SUPABASE_DB_POOLER_URL}
        REDIS_HOST: ${REDIS_HOST}
        REDIS_PORT: ${REDIS_PORT}
        REDIS_PASSWORD: ${REDIS_PASSWORD}
        REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED}
        OPENAI_API_KEY: ${OPENAI_API_KEY}
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
        EXA_API_KEY: ${EXA_API_KEY}
        CLADO_API_KEY: ${CLADO_API_KEY}
        COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
        ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
        CRON_SECRET: ${CRON_SECRET}
    image: autoreach:local
    command: npm run dev -- --hostname 0.0.0.0 --port 3002
    depends_on:
      - redis
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TLS_ENABLED: "false"
    ports:
      - "3002:3002"
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        SUPABASE_DB_POOLER_URL: ${SUPABASE_DB_POOLER_URL}
        REDIS_HOST: ${REDIS_HOST}
        REDIS_PORT: ${REDIS_PORT}
        REDIS_PASSWORD: ${REDIS_PASSWORD}
        REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED}
        OPENAI_API_KEY: ${OPENAI_API_KEY}
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
        EXA_API_KEY: ${EXA_API_KEY}
        CLADO_API_KEY: ${CLADO_API_KEY}
        COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
        ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
        CRON_SECRET: ${CRON_SECRET}
    image: autoreach:local
    command: npm run worker:nest:dev
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 6g
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
      CHOKIDAR_USEPOLLING: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TLS_ENABLED: "false"
    ports:
      - "4010:4010"
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - .env
    restart: unless-stopped

volumes:
  redis-data:
